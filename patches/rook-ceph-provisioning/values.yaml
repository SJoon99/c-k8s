---
rookCephProvisioning:
  postConfig:
    enabled: true
    name: rook-ceph-poc-config
    image: quay.io/ceph/ceph:v19.2.1
    activeDeadlineSeconds: 1800
    backoffLimit: 20
    serviceAccountName: rook-ceph-default
    poolName: .mgr
    poolSize: 1
    poolMinSize: 1
    monClockDriftAllowed: "0.1"
    muteNoReplicaWarnings: true
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        memory: 512Mi

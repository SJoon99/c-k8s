---
# c child-cluster preset values for the ScaleX Repo POC.
# Base/framework repo: https://github.com/SJoon99/eecs-k8s.git

cluster:
  name: c
  # eecs-k8s uses cluster.group as the cluster-values repo targetRevision.
  # Keep an ops branch, mirroring tower-k8s.
  group: ops
  singleNode: false
  standalone: false
  apiEndpoint: https://10.33.201.181:6443
  domainBase: openark
  nameservers:
    loadBalancer:
      ipv4: ""
  pods:
    ipv4:
      # Must match the kubeadm/Kubespray podSubnet observed on the child cluster.
      subnet: 10.96.0.0/12
      childSubnet: 10.96.0.0/12
      prefix: 24
  services:
    ipv4:
      # Must match the kubeadm/Kubespray serviceSubnet observed on the child cluster.
      subnet: 10.112.0.0/12
      childSubnet: 10.112.0.0/12
    kubeProxy:
      # Kubespray created the child clusters for Cilium kube-proxy replacement.
      enabled: false

# Day-1 child-cluster storage bootstrap: Cilium/CoreDNS is verified, so enable
# the Ceph-backed CSI layer before higher-level PVC consumers.
features:
  - nvidia.com/gpu
  - org.ulagbulag.io/cni
  - org.ulagbulag.io/cni/lb-ipam
  - org.ulagbulag.io/csi
  - org.ulagbulag.io/distributed-storage-cluster/ceph
  - org.ulagbulag.io/distributed-storage-cluster/ceph/provisioning
  - org.ulagbulag.io/omniverse/nucleus
  - org.ulagbulag.io/workload-namespace

ingress:
  domainName: c.scalex.local
  loadBalancerIPs:
    gitlab: 0.0.0.0
    ingress: 0.0.0.0
    ns1: 0.0.0.0
    ns2: 0.0.0.0

# POC storage topology has fewer than three OSD failure domains, so use
# non-replicated Ceph pools for the first CSI validation pass.
rookCeph:
  useReplicas: false

repo:
  baseUrl: https://github.com
  owner: SJoon99
  name: eecs-k8s
  revision: main

# Tower Argo is the only GitOps control plane for this POC stage.
tower:
  cluster: tower
  controlPlane: false
  domainName: scalex.local
  group: ops
